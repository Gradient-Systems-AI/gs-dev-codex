Report back one of: DONE (with a short summary + the files you changed), DONE_WITH_CONCERNS (with the concerns), NEEDS_CONTEXT (what's missing), or BLOCKED (why). Keep the report terse and structured -- it is consumed by the orchestrator, not a human.

'''
