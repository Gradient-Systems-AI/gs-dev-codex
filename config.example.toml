# gs-dev — Codex CLI configuration
#
# Codex reads config from ~/.codex/config.toml (not this repo). Merge the block
# below in. The gs-dev plugin (skills) installs via `codex plugin add`; the
# specialist subagents install into ~/.codex/agents/ (see README).
#
# This variant uses the `gh` CLI for Issues and PRs — run `gh auth login` first.

# --- Subagent orchestration -------------------------------------------------
# The review phase fans out to up to 7 specialist reviewers at once. The default
# max_threads is 6, which silently serializes the 7th. Bump it so the whole panel
# runs in parallel.
[agents]
max_threads = 8      # >= widest fan-out (7 reviewers + headroom)
max_depth   = 1      # keep the skill on the main thread; it fans out one level

# --- Models -----------------------------------------------------------------
# You do NOT set agent models here. Each agent is tagged with a tier (L/M/S), and
# the installer (hooks/resolve-models.py) resolves that tier to the best model your
# Codex actually has — read from ~/.codex/models_cache.json — with fallbacks:
#
#   Tier   Role                         Preferred        Fallbacks
#   L      complex / high-stakes        gpt-5.6-sol      gpt-5.5, gpt-5.4
#   M      balanced / everyday          gpt-5.6-terra    gpt-5.4, gpt-5.5
#   S      simple / fast                gpt-5.6-luna     gpt-5.4-mini, gpt-5.4
#
# Reasoning effort is set per agent on top of the model (L=high, M=medium, S=low).
# If no known model matches, the agent omits `model` and inherits your session
# model — so it always works. Re-runs are idempotent.
#
# To pin a model yourself: edit that agent's file in ~/.codex/agents/ and remove
# the `# gs-dev:auto` marker from its `model = ` line — the installer won't touch it.
